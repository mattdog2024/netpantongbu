name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'bdpan_ci.spec'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.1), leave empty to skip Release'
        required: false
        default: ''

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 requests schedule pyinstaller

      - name: Build EXE
        run: |
          pyinstaller bdpan_ci.spec --clean --noconfirm
          dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiduPanScheduler-Windows
          path: dist/BaiduPanScheduler.exe
          retention-days: 7
          if-no-files-found: error

      - name: Create Release
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: BaiduPan Scheduler ${{ github.event.inputs.release_tag }}
          body: |
            ## 百度网盘定时下载器 ${{ github.event.inputs.release_tag }}

            下载 `BaiduPanScheduler.exe`，双击即可运行，无需安装。

            功能：无需百度客户端、扫码登录、定时下载、断点续传、图形界面。
          files: dist/BaiduPanScheduler.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
