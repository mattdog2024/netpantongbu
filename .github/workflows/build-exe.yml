name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'bdpan_ci.spec'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.2), leave empty to skip Release'
        required: false
        default: ''

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 requests schedule pyinstaller

      - name: Build EXE
        run: |
          pyinstaller bdpan_ci.spec --clean --noconfirm
          dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiduPanScheduler-Windows
          path: dist/BaiduPanScheduler_*.exe
          retention-days: 7
          if-no-files-found: error

      - name: Create Release
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: BaiduPan Scheduler ${{ github.event.inputs.release_tag }}
          body: |
            ## 百度网盘定时下载器 ${{ github.event.inputs.release_tag }}

            下载 `BaiduPanScheduler_*.exe`，双击即可运行，无需安装。

            ### 本版本更新内容
            - 修复下载失败问题（User-Agent 验证）
            - 修复定时触发后未真正开始下载的问题
            - 新增运行日志面板（实时显示下载详情）
            - 新增「重试失败」按钮
            - 版本号显示在标题栏和界面顶部
          files: dist/BaiduPanScheduler_*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
