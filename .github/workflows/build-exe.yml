name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'bdpan_ci.spec'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.4), leave empty to skip Release'
        required: false
        default: ''

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 requests schedule pyinstaller

      - name: Build EXE
        run: |
          pyinstaller bdpan_ci.spec --clean --noconfirm
          dir dist

      - name: Get version
        id: get_version
        shell: python
        run: |
          import sys, os
          sys.path.insert(0, '.')
          from version import APP_VERSION
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={APP_VERSION}\n')
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiduPanScheduler-Windows-${{ steps.get_version.outputs.version }}
          path: dist/BaiduPanScheduler_*.exe
          retention-days: 7
          if-no-files-found: error

      - name: Create Release
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: BaiduPan Scheduler ${{ github.event.inputs.release_tag }}
          body: |
            ## 百度网盘定时下载器 ${{ github.event.inputs.release_tag }}

            下载 `BaiduPanScheduler_*.exe`，双击即可运行，无需安装。

            ### 本版本更新内容（v1.4）
            - 彻底放弃 sign/timestamp 方案，改用 pcs.baidu.com locatedownload 接口
            - 修复下载链接获取失败（errno=2）问题
            - 修复进度回调参数顺序错误
            - 版本号显示在标题栏和界面顶部
          files: dist/BaiduPanScheduler_*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
